version: "3.9"

networks:
  market_net:
    driver: bridge

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: market_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - market_net
    environment:
      MONGO_INITDB_DATABASE: market_chatbot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (Admin UI) ───────────────────────────────────────────────
  mongo-express:
    image: mongo-express
    container_name: market_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - market_net
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: market_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - market_net
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: market_chatbot
      FRONTEND_ORIGIN: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      UPLOAD_DIR: /app/uploads
      VECTOR_STORE_DIR: /app/vector_store
    volumes:
      - uploads_data:/app/uploads
      - vector_data:/app/vector_store
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "/api"
    container_name: market_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - market_net
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  uploads_data:
  vector_data:
